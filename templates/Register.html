<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account | XAI Botnet Shield</title>
  <script>
function validateEmail(value) { if (/^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/.test(value)) return true; alert("Please enter valid email"); return false; }
function validate() {
  var x=document.forms["f1"]["t1"].value, y=document.forms["f1"]["t2"].value, c=document.forms["f1"]["t3"].value, d=document.forms["f1"]["t4"].value, e=document.forms["f1"]["t5"].value;
  if (x == null || x.trim() == "") { alert("Username must be entered"); document.f1.t1.focus(); return false; }
  if (y == null || y.trim() == "") { alert("Password must be entered"); document.f1.t2.focus(); return false; }
  if (c == null || c.trim() == "") { alert("Contact number must be entered"); document.f1.t3.focus(); return false; }
  if (isNaN(c)) { alert("Please enter valid contact number"); document.f1.t3.focus(); return false; }
  if (d == null || d.trim() == "") { alert("Please enter email id"); document.f1.t4.focus(); return false; }
  if (!validateEmail(d)) { document.f1.t4.focus(); return false; }
  if (e == null || e.trim() == "") { alert("Please enter address"); document.f1.t5.focus(); return false; }
  return true;
}
</script>
  <style>

    :root {
      --bg: #071014;
      --panel: rgba(255, 255, 255, 0.94);
      --ink: #172026;
      --muted: #64727d;
      --line: rgba(23, 32, 38, 0.12);
      --brand: #0f8b8d;
      --brand-dark: #0b6668;
      --accent: #f4b942;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.26);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(120deg, rgba(7, 16, 20, 0.92), rgba(12, 38, 44, 0.72)), url("{{ url_for('static', filename='images/back.jpg') }}") center / cover fixed;
    }
    a { color: inherit; text-decoration: none; }
    .shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
    .topbar { position: sticky; top: 0; z-index: 20; border-bottom: 1px solid rgba(255,255,255,0.14); background: rgba(7, 16, 20, 0.82); backdrop-filter: blur(18px); }
    .nav { min-height: 72px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .brand { display: flex; align-items: center; gap: 12px; color: #fff; min-width: 230px; }
    .brand-mark { width: 42px; height: 42px; border-radius: var(--radius); display: grid; place-items: center; color: #071014; font-weight: 900; background: linear-gradient(135deg, #f4b942, #6dd6d8); box-shadow: 0 12px 34px rgba(15, 139, 141, 0.35); }
    .brand-title { font-size: 16px; font-weight: 800; line-height: 1.1; }
    .brand-subtitle { display: block; margin-top: 3px; font-size: 12px; color: rgba(255,255,255,0.62); font-weight: 600; }
    .nav-links { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .nav-links a { color: rgba(255,255,255,0.82); padding: 10px 14px; border-radius: var(--radius); font-size: 14px; font-weight: 700; transition: 160ms ease; }
    .nav-links a:hover, .nav-links a.active { color: #fff; background: rgba(255,255,255,0.12); }
    .nav-links a.primary { color: #071014; background: #f4b942; }
    .nav-links a.primary:hover { background: #ffd36c; }
    .hero { min-height: calc(100vh - 72px); display: grid; grid-template-columns: minmax(0, 1.08fr) minmax(340px, 0.92fr); gap: 42px; align-items: center; padding: 54px 0 68px; }
    .eyebrow { display: inline-flex; color: #d7fbfc; background: rgba(15, 139, 141, 0.24); border: 1px solid rgba(109, 214, 216, 0.34); padding: 8px 11px; border-radius: var(--radius); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; }
    h1 { margin: 18px 0 16px; color: #fff; font-size: clamp(38px, 5vw, 70px); line-height: 0.98; letter-spacing: 0; }
    .lead { max-width: 680px; color: rgba(255,255,255,0.78); font-size: 18px; line-height: 1.65; margin: 0; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
    .btn { border: 0; border-radius: var(--radius); padding: 13px 18px; min-height: 46px; display: inline-flex; align-items: center; justify-content: center; gap: 9px; font-weight: 800; font-size: 14px; cursor: pointer; transition: transform 150ms ease, background 150ms ease; }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { color: #071014; background: #f4b942; box-shadow: 0 14px 30px rgba(244, 185, 66, 0.24); }
    .btn-primary:hover { background: #ffd36c; }
    .btn-secondary { color: #fff; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); }
    .btn-secondary:hover { background: rgba(255,255,255,0.18); }
    .visual-panel, .form-panel, .content-card { border-radius: var(--radius); background: var(--panel); box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.56); overflow: hidden; }
    .visual-image { min-height: 260px; background: url("{{ url_for('static', filename='images/tra.jpg') }}") center / cover; position: relative; }
    .visual-image::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, transparent, rgba(7,16,20,0.42)); }
    .panel-body { padding: 26px; }
    .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid var(--line); }
    .metric { padding: 18px; background: #fff; border-right: 1px solid var(--line); }
    .metric:last-child { border-right: 0; }
    .metric strong { display: block; font-size: 22px; color: var(--brand-dark); }
    .metric span { display: block; margin-top: 4px; font-size: 12px; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; }
    .center-layout { min-height: calc(100vh - 72px); display: grid; place-items: center; padding: 48px 0 76px; }
    .page-section { padding: 54px 0 76px; }
    .form-panel { width: min(760px, 100%); }
    .form-header { padding: 28px 30px; border-bottom: 1px solid var(--line); background: linear-gradient(135deg, #ffffff, #edfafa); }
    .form-header h1 { color: var(--ink); font-size: clamp(28px, 4vw, 42px); line-height: 1.05; margin: 0 0 10px; }
    .form-header p, .content-card-header p { color: var(--muted); margin: 0; line-height: 1.55; }
    .form-body { padding: 30px; display: grid; gap: 18px; }
    .form-body.two-col { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .field.full, .message, .form-actions { grid-column: 1 / -1; }
    .field { display: grid; gap: 8px; }
    label { color: #26343c; font-size: 13px; font-weight: 800; }
    input[type="text"], input[type="password"], input[type="file"] { width: 100%; min-height: 46px; border: 1px solid #ccd7dc; border-radius: var(--radius); padding: 11px 13px; font: inherit; color: var(--ink); background: #fff; outline: none; transition: border 150ms ease, box-shadow 150ms ease; }
    input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px rgba(15,139,141,0.14); }
    input[type="file"] { padding: 9px; background: #f8fbfc; }
    .message { color: var(--brand-dark); font-weight: 800; text-align: center; min-height: 22px; }
    .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; }
    .feature-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 30px; }
    .feature { color: #fff; padding: 16px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.09); border-radius: var(--radius); }
    .feature b { display: block; margin-bottom: 6px; }
    .feature span { color: rgba(255,255,255,0.68); line-height: 1.45; font-size: 13px; }
    .content-card-header { padding: 22px 26px; background: linear-gradient(135deg, #fff, #edfafa); border-bottom: 1px solid var(--line); }
    .content-card-header h2 { margin: 0; font-size: 24px; }
    .results-panel { padding: 24px; overflow-x: auto; }
    .results-panel table { width: 100% !important; border-collapse: collapse !important; background: #fff; border-radius: var(--radius); overflow: hidden; }
    .results-panel th { background: #10272c; color: #fff !important; padding: 12px 14px; text-align: left; font-size: 13px; }
    .results-panel td { padding: 11px 14px; border-bottom: 1px solid var(--line); color: var(--ink) !important; font-size: 13px; vertical-align: top; }
    .results-panel tr:nth-child(even) td { background: #f7fbfb; }
    .results-panel font { color: inherit !important; font-size: inherit !important; }
    .results-panel img { max-width: 100%; height: auto; display: block; margin: 24px auto 0; border-radius: var(--radius); }
    @media (max-width: 860px) {
      .nav { align-items: flex-start; flex-direction: column; padding: 14px 0; }
      .nav-links { justify-content: flex-start; }
      .hero { grid-template-columns: 1fr; padding-top: 34px; }
      .metric-grid, .feature-strip, .form-body.two-col { grid-template-columns: 1fr; }
      .metric { border-right: 0; border-bottom: 1px solid var(--line); }
      .metric:last-child { border-bottom: 0; }
      .form-actions { justify-content: stretch; flex-direction: column; }
      .btn { width: 100%; }
    }

  </style>
</head>
<body>
<header class="topbar"><div class="shell nav"><a class="brand" href="index"><span class="brand-mark">XB</span><span><span class="brand-title">XAI Botnet Shield</span><span class="brand-subtitle">New analyst registration</span></span></a><nav class="nav-links"><a href="index">Home</a><a href="AdminLogin">User Login</a><a class="primary active" href="Register">Create Account</a></nav></div></header>
<main class="shell center-layout"><form class="form-panel" name="f1" method="post" action="/RegisterAction" onsubmit="return validate(this);"><div class="form-header"><h1>Create Account</h1><p>Register a user profile for accessing botnet attack detection and XAI result screens.</p></div><div class="form-body two-col"><div class="message">{{ msg|safe }}</div><div class="field"><label for="reg-username">Username</label><input id="reg-username" type="text" name="t1" autocomplete="username" placeholder="Choose username"></div><div class="field"><label for="reg-password">Password</label><input id="reg-password" type="password" name="t2" autocomplete="new-password" placeholder="Create password"></div><div class="field"><label for="contact">Contact No</label><input id="contact" type="text" name="t3" inputmode="numeric" placeholder="Contact number"></div><div class="field"><label for="email">Email ID</label><input id="email" type="text" name="t4" placeholder="name@example.com"></div><div class="field full"><label for="address">Address</label><input id="address" type="text" name="t5" placeholder="Enter address"></div><div class="form-actions"><a class="btn btn-secondary" href="AdminLogin">Already Registered</a><button class="btn btn-primary" type="submit">Create Account</button></div></div></form></main>
</body>
</html>
